<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Caméra</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #111;
      color: white;
    }

    #container {
      display: inline-block;
      border: 4px solid white;
      margin-top: 20px;
    }

    video {
      width: 500px;
      max-width: 100%;
      transform: scaleX(1);
    }

    .mirroir {
      transform: scaleX(-1);
    }

    button {
      margin: 10px;
      padding: 10px 15px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Accès caméra</h1>

  <div id="container">
    <video id="video" autoplay playsinline></video>
  </div>

  <div>
    <button onclick="pleinEcran()">Plein écran</button>
    <button onclick="toggleMirroir()">Inverser</button>
  </div>

  <script>
    const video = document.getElementById("video");

    // Accès caméra
    async function initCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: false
        });
        video.srcObject = stream;
      } catch (err) {
        alert("Erreur accès caméra : " + err);
      }
    }

    // Plein écran
    function pleinEcran() {
      if (video.requestFullscreen) {
        video.requestFullscreen();
      } else if (video.webkitRequestFullscreen) {
        video.webkitRequestFullscreen();
      } else if (video.msRequestFullscreen) {
        video.msRequestFullscreen();
      }
    }

    // Inverser image
    function toggleMirroir() {
      video.classList.toggle("mirroir");
    }

    initCamera();
  </script>

</body>
</html>
